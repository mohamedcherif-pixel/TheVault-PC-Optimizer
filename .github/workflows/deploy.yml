name: Auto-Build and Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pygame requests

    - name: Build with PyInstaller
      run: |
        pyinstaller NormieTools.spec

    # ── Code Signing with Azure Trusted Signing ──
    # This removes the SmartScreen "Windows protected your PC" warning.
    # Requires Azure Trusted Signing secrets to be configured in repo settings.
    # See SIGNING.md for setup instructions.
    - name: Sign NormieTools.exe with Azure Trusted Signing
      if: ${{ secrets.AZURE_TENANT_ID != '' }}
      uses: azure/trusted-signing-action@v0.5.0
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
        trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
        certificate-profile-name: ${{ secrets.TRUSTED_SIGNING_CERT_PROFILE }}
        files-folder: dist
        files-folder-filter: exe
        file-digest: SHA256
        timestamp-rfc3161: http://timestamp.acs.microsoft.com
        timestamp-digest: SHA256

    - name: Build Inno Setup Installer
      run: |
        iscc setup.iss

    - name: Sign NormieTools_Setup.exe with Azure Trusted Signing
      if: ${{ secrets.AZURE_TENANT_ID != '' }}
      uses: azure/trusted-signing-action@v0.5.0
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
        trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
        certificate-profile-name: ${{ secrets.TRUSTED_SIGNING_CERT_PROFILE }}
        files-folder: Output
        files-folder-filter: exe
        file-digest: SHA256
        timestamp-rfc3161: http://timestamp.acs.microsoft.com
        timestamp-digest: SHA256

    - name: Generate SHA256 Checksums
      shell: pwsh
      run: |
        $exe = Get-FileHash "dist\NormieTools.exe" -Algorithm SHA256
        $setup = Get-FileHash "Output\NormieTools_Setup.exe" -Algorithm SHA256
        @"
        # SHA256 Checksums

        Verify your download is authentic by comparing these hashes.

        ``````
        $($exe.Hash)  NormieTools.exe
        $($setup.Hash)  NormieTools_Setup.exe
        ``````

        **How to verify (PowerShell):**
        ``````powershell
        (Get-FileHash .\NormieTools.exe -Algorithm SHA256).Hash
        ``````
        "@ | Out-File -FilePath "CHECKSUMS.txt" -Encoding utf8

    - name: Extract version from main.py
      id: get_version
      shell: bash
      run: |
        VERSION=$(grep "APP_VERSION =" main.py | cut -d'"' -f2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: Release ${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false
        files: |
          dist/NormieTools.exe
          Output/NormieTools_Setup.exe
          CHECKSUMS.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
