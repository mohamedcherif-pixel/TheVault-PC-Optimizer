name: Auto-Build and Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pygame requests

    - name: Build with PyInstaller
      run: |
        pyinstaller NormieTools.spec

    - name: Build Inno Setup Installer
      run: |
        iscc setup.iss

    # ── Code Signing (SignPath.io — FREE for open-source) ──
    # Eliminates the SmartScreen "Windows protected your PC" warning.
    # See SIGNING.md for setup instructions.

    - name: Upload EXE artifact for signing
      if: ${{ vars.SIGNPATH_ORG_ID != '' }}
      uses: actions/upload-artifact@v4
      id: upload-exe
      with:
        name: NormieTools-unsigned
        path: |
          dist/NormieTools.exe
          Output/NormieTools_Setup.exe

    - name: Sign with SignPath.io
      if: ${{ vars.SIGNPATH_ORG_ID != '' }}
      uses: signpath/github-action-submit-signing-request@v1
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: ${{ vars.SIGNPATH_ORG_ID }}
        project-slug: NormieTools
        signing-policy-slug: NormieTools
        artifact-configuration-slug: initial
        github-artifact-id: ${{ steps.upload-exe.outputs.artifact-id }}
        wait-for-completion: true
        output-artifact-directory: signed-output

    - name: Replace with signed binaries
      if: ${{ vars.SIGNPATH_ORG_ID != '' }}
      shell: pwsh
      run: |
        if (Test-Path "signed-output/NormieTools.exe") {
          Copy-Item "signed-output/NormieTools.exe" "dist/NormieTools.exe" -Force
        }
        if (Test-Path "signed-output/NormieTools_Setup.exe") {
          Copy-Item "signed-output/NormieTools_Setup.exe" "Output/NormieTools_Setup.exe" -Force
        }

    - name: Generate SHA256 Checksums
      shell: pwsh
      run: |
        $exe = Get-FileHash "dist\NormieTools.exe" -Algorithm SHA256
        $setup = Get-FileHash "Output\NormieTools_Setup.exe" -Algorithm SHA256
        @"
        # SHA256 Checksums

        Verify your download is authentic by comparing these hashes.

        ``````
        $($exe.Hash)  NormieTools.exe
        $($setup.Hash)  NormieTools_Setup.exe
        ``````

        **How to verify (PowerShell):**
        ``````powershell
        (Get-FileHash .\NormieTools.exe -Algorithm SHA256).Hash
        ``````
        "@ | Out-File -FilePath "CHECKSUMS.txt" -Encoding utf8

    - name: Extract version from main.py
      id: get_version
      shell: bash
      run: |
        VERSION=$(grep "APP_VERSION =" main.py | cut -d'"' -f2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: Release ${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false
        files: |
          dist/NormieTools.exe
          Output/NormieTools_Setup.exe
          CHECKSUMS.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
