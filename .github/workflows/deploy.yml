name: Auto-Build and Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "pyinstaller>=6.11" pygame requests pillow

    - name: Build with PyInstaller
      run: |
        pyinstaller NormieTools.spec

    - name: Verify build contains critical DLLs
      shell: pwsh
      run: |
        # Extract the onefile exe to a temp dir and check for Python + VC++ DLLs
        $exe = "dist\NormieTools.exe"
        $size = (Get-Item $exe).Length
        Write-Host "Built exe size: $size bytes"
        if ($size -lt 5MB) { throw "Exe suspiciously small ($size bytes)" }
        # Verify PE header
        $header = [System.IO.File]::ReadAllBytes($exe)[0..1]
        if ($header[0] -ne 0x4D -or $header[1] -ne 0x5A) { throw "Invalid PE header" }
        Write-Host "Build verification passed"

    - name: Build Inno Setup Installer
      run: |
        iscc setup.iss

    # ── Code Signing ──
    # After the build, sign both EXEs via SignPath.io (free for open-source).
    # Automated CI signing requires the SignPath Foundation plan.
    # Until then, sign manually: download from release → upload to SignPath → replace.
    # See SIGNING.md for details.

    - name: Generate SHA256 Checksums
      shell: pwsh
      run: |
        $exe = Get-FileHash "dist\NormieTools.exe" -Algorithm SHA256
        $setup = Get-FileHash "Output\NormieTools_Setup.exe" -Algorithm SHA256
        @"
        # SHA256 Checksums

        Verify your download is authentic by comparing these hashes.

        ``````
        $($exe.Hash)  NormieTools.exe
        $($setup.Hash)  NormieTools_Setup.exe
        ``````

        **How to verify (PowerShell):**
        ``````powershell
        (Get-FileHash .\NormieTools.exe -Algorithm SHA256).Hash
        ``````
        "@ | Out-File -FilePath "CHECKSUMS.txt" -Encoding utf8

    - name: Extract version from main.py
      id: get_version
      shell: bash
      run: |
        VERSION=$(grep "APP_VERSION =" main.py | cut -d'"' -f2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: Release ${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false
        files: |
          dist/NormieTools.exe
          Output/NormieTools_Setup.exe
          CHECKSUMS.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
